# StratCoder-LLM training/eval config — version v1
version: v1
seed: 11

model:
  base: Qwen/Qwen2.5-Coder-1.5B-Instruct
  max_seq_len: 1280

data:
  train: data/train.jsonl
  val: data/val.jsonl
  test: data/test.jsonl

qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

train:
  output_dir: outputs/stratcoder-qlora-v1
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: epoch
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 0.3
  optim: paged_adamw_8bit

generation:
  max_new_tokens: 768
  do_sample: false
  temperature: 0.0

# VRAM knobs (for <24GB): lower per_device_train_batch_size to 2/1, raise grad accum, max_seq_len 1024, lora_r 8.
