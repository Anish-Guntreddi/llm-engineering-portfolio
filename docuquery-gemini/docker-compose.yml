services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: docuquery
      POSTGRES_PASSWORD: docuquery
      POSTGRES_DB: docuquery
    ports:
      - "5433:5432"   # host 5433 to avoid clashing with a local postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuquery"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
